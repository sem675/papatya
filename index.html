<!DOCTYPE html>
<html>
<head>
  <title>Bilmece 💙</title>
</head>
<body style="text-align:center; margin-top:50px;">

<h2>💭 Bilmece:</h2>
<p>Uğurlu sayın nedir?</p>

<input type="text" id="cevap" placeholder="Cevabını yaz">
<br><br>
<button onclick="check()">Cevabı kontrol et</button>

<p id="sonuc"></p>

<img id="resim" src="D825D307-4207-448F-9A4F-1D3AE127BE0B.jpeg" width="500" style="display:none;">

<script>
function check() {
  let a = document.getElementById("cevap").value.trim();

  if(a === "3") {
    document.getElementById("sonuc").innerHTML = "Doğru 💙";
    document.getElementById("resim").style.display = "block";
  } else {
    document.getElementById("sonuc").innerHTML = "Yanlış 😢";
  }
}
</script>

</body>
</html>
